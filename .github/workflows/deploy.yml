name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build and restart Docker
        run: |
          docker build -t carewave-fastapi .
          docker stop $(docker ps -q --filter "publish=8000") || true
          sleep 1
          docker run -d -p 8000:8000 --restart unless-stopped carewave-fastapi
          docker image prune -f
