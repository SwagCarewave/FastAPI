name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull and deploy
        run: |
          cd ~/FastAPI
          git pull origin main
          docker build -t carewave-fastapi .
          docker stop $(docker ps -q --filter "publish=8000") || true
          sleep 1
          docker run -d -p 8000:8000 --restart unless-stopped carewave-fastapi
          docker image prune -f
